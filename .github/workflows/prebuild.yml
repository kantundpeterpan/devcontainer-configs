name: Prebuild devcontainer

on:
  push:
    branches: ['main']
  workflow_dispatch:
  workflow_call:

env:
  DEVPOD_PREBUILD_REPO: ghcr.io/${{ github.repository_owner }}/devpod-cache
  GHCR_USERNAME: ${{ github.repository_owner }}

jobs:
  detect-variants:
    runs-on: ubuntu-latest
    outputs:
      variants: ${{ steps.set-matrix.outputs.variants }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            changed=$(git diff --name-only "${{ github.event.before }}"..HEAD -- '*/devcontainer.json' \
              | sed 's|/devcontainer.json||' | sort -u)
            if [ -z "$changed" ]; then
              echo "variants=[]" >> "$GITHUB_OUTPUT"
            else
              variants=$(echo "$changed" | jq -R -s -c 'split("\n") | map(select(length > 0))')
              echo "variants=$variants" >> "$GITHUB_OUTPUT"
            fi
          else
            variants=$(printf '%s\n' */devcontainer.json | sed 's|/devcontainer.json||' | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "variants=$variants" >> "$GITHUB_OUTPUT"
          fi

  prebuild-devcontainer:
    needs: detect-variants
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJson(needs.detect-variants.outputs.variants) }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install devpod
        run: |
          curl -LO "https://github.com/loft-sh/devpod/releases/latest/download/devpod-linux-amd64"
          sudo install devpod-linux-amd64 /usr/local/bin/devpod

      - name: Devpod setup
        run: |
          devpod provider add docker
          devpod provider use docker

      - name: Prebuild variant
        run: devpod build . --devcontainer-path "./${{ matrix.variant }}/devcontainer.json"
