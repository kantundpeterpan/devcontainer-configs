name: Prebuild devcontainer

on:
  push:
    branches: ['main']
  workflow_dispatch:
  workflow_call:

env:
  DEVPOD_PREBUILD_REPO: ghcr.io/${{ github.repository_owner }}/devpod-cache

jobs:
  prebuild-devcontainer:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install devpod
        run: |
          curl -LO "https://github.com/loft-sh/devpod/releases/latest/download/devpod-linux-amd64"
          sudo install devpod-linux-amd64 /usr/local/bin/devpod

      - name: Devpod setup
        run: |
          devpod provider add docker
          devpod provider use docker

      - name: Prebuild all variants
        run: |
          for dir in */devcontainer.json; do
            variant=$(dirname "$dir")
            echo "=== Prebuilding $variant ==="
            devpod build . --devcontainer-path "./$variant/devcontainer.json"
          done
